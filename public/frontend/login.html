<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in — TaskManager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">

    <div class="login-card card">
        <div class="brand">
            <div class="brand-icon">✓</div>
            <h1>TaskManager</h1>
            <p>Sign in to access your tasks</p>
        </div>

        <form id="login-form" novalidate>
            <div class="field">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="you@example.com" autocomplete="email" required>
            </div>
            <div class="field">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required>
            </div>

            <div id="login-error" class="error-msg hidden"></div>

            <button type="submit" id="btn-submit" class="btn btn-primary submit-btn">
                Sign in
            </button>
        </form>
    </div>

    <script src="app.js"></script>
    <script>
        // If already signed in, go straight to the dashboard
        if (getToken()) {
            window.location.href = 'dashboard.html';
        }

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            showError('login-error', '');

            const email    = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const btn      = document.getElementById('btn-submit');

            if (!email || !password) {
                showError('login-error', 'Please fill in all fields.');
                return;
            }

            btn.disabled    = true;
            btn.textContent = 'Signing in…';

            try {
                const { ok, data } = await api.login(email, password);

                if (ok && data.token) {
                    setToken(data.token);
                    setUser(data.user);
                    window.location.href = 'dashboard.html';
                } else {
                    const msg = data.errors?.email?.[0]
                        || data.message
                        || 'Invalid credentials.';
                    showError('login-error', msg);
                }
            } catch (err) {
                showError('login-error', err.message);
            } finally {
                btn.disabled    = false;
                btn.textContent = 'Sign in';
            }
        });

        // Submit with Enter
        document.getElementById('password').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') document.getElementById('login-form').requestSubmit();
        });
    </script>
</body>
</html>
